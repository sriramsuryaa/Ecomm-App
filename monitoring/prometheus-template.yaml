global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]  
    static_configs:
      - targets:
          - http://${EC_APP_DEV}
        labels:
          env: dev
          app: ecomm-app
      - targets:
          - http://${EC_APP_PROD}
        labels:
          env: prod
          app: ecomm-app
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  
